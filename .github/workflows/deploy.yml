# This is a basic workflow to help you get started with Actions
name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]


# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  # build:
  deploy:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        run: |
          echo Add other actions to build,
          echo test, and deploy your project.
      
      - name : Setup SSH
        run : |
          mkdir -p ~/.ssh/
          echo "${{ secrets.AWS_EC2_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy to aws 
        
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.AWS_EC2_USER }}@${{ secrets.AWS_EC2_IP }} << 'EOF'


          ########## case 2 : env folder inside ubuntu folder #######

          cd /home/ubuntu/
          source env/bin/activate

          git pull origin main

          pip install -r req.txt

          cd /home/ubuntu/PERSONAL_EXPENSE_MANAGER/Personal_Expense_Tracker/
          python manage.py migrate

          sudo supervisorctl restart all
          sudo systemctl restart nginx
          EOF